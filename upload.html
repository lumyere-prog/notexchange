<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteXchange - Upload</title>

<link rel="stylesheet" href="/css/upload.css">
<link rel="stylesheet" href="/css/global.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
     
    <div class="upload-page">

    <!-- HEADER -->
    <div class="upload-header">
        <img src="/photos/profile.jpg" class="profile-pic">
        <h2>Upload Your Notes</h2>
        <img src="" class="notif-icon">
    </div>

    <!-- FILE BOX -->
<div class="upload-box">
    <p class="upload-title">Select File to Upload</p>
    <p class="upload-sub">Supported Format: PDF, DOCS</p>

    <label class="file-btn">
        Select File ⬆
        <input type="file" id="fileInput" hidden>
    </label>

    <p id="fileName" class="file-name"></p>
</div>

<!-- 🔥 FORM WRAPPER -->
<form id="postForm">

    <div class="form-group">
        <label>Title Field</label>
        <input type="text" id="title" placeholder="Enter Title Field" required>
    </div>

    <div class="form-group">
        <label>Subject</label>
        <input type="text" id="subject" placeholder="Enter Subject">
    </div>

    <div class="form-group">
        <label>Description</label>
        <textarea id="description" placeholder="Enter Description" required></textarea>
    </div>

    <!-- UPLOAD BUTTON -->
    <button type="submit" class="upload-btn">Upload</button>

</form>


<div class="bottom-nav">

    <a href="home.html" class="nav-item">
        <span class="material-icons">home</span>
    </a>

    <a href="saved.html" class="nav-item">
        <span class="material-icons">book</span>
    </a>

    <a href="upload.html" class="nav-item add-btn">
        <span class="material-icons">add</span>
    </a>

    <a href="profile.html" class="nav-item">
        <span class="material-icons">person</span>
    </a>

</div>

<script type="module" src="/js/upload.js"></script>
<script src="/js/nav.js"></script>
<script type="module" src="/js/auth-state.js"></script>
</body>
</html>
