<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteXchange - Upload</title>

<link rel="stylesheet" href="/css/upload.css">
<link rel="stylesheet" href="/css/global.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
     
    <div class="upload-page">

    <!-- HEADER -->
    <div class="upload-header">
        <h2>Upload Your Notes</h2>
    </div>

    <!-- FILE BOX -->
<div class="upload-box">
    <p class="upload-title">Select File to Upload</p>
    <p class="upload-sub">Supported Format: PDF</p>

    <label class="file-btn">
        Select File ⬆
        <input type="file" id="fileInput" hidden>
    </label>

    <p id="fileName" class="file-name"></p>
</div>

<!-- 🔥 FORM WRAPPER -->
<form id="postForm">

    <div class="form-group">
        <label>Title Field</label>
        <input type="text" id="title" placeholder="Enter Title Field" required>
    </div>

    <div class="form-group">
        <label>Subject</label>
        <div class="subject-dropdown" id="subjectDropdown">
            <button type="button" class="subject-control" id="subjectBtn" aria-haspopup="listbox" aria-expanded="false">
                <span id="subjectValue">Select a subject</span>
                <span class="material-icons">expand_more</span>
            </button>
            <div class="subject-options hidden" id="subjectOptions" role="listbox" aria-labelledby="subjectBtn"></div>
        </div>
        <input type="hidden" id="subject" required>
    </div>

    <div class="form-group">
        <label>Description</label>
        <textarea id="description" placeholder="Enter Description" required></textarea>
    </div>

    <!-- UPLOAD BUTTON -->
    <button type="submit" class="upload-btn">Upload</button>
    
</form>

<!-- NEW UPLOAD SUCCESS MODAL -->
<div id="uploadModal" class="upload-modal hidden">
  <div class="upload-modal-content">
    <img src="/photos/review.png" alt="Reviewing" class="review-image">
    <h3>Reviewer Submitted!</h3>
    <p>Your file is now being reviewed by the admins. You'll get your points once it's approved!</p>
    
    <div class="points-pending">
        ⏳ 100 Points Pending
    </div>
    
    <button id="uploadAgainBtn" class="upload-again-btn">Upload Another</button>
    <button id="modalCloseBtn" class="back-dashboard-btn">Back To Dashboard</button>
    
  </div>
</div>


<div class="bottom-nav">

    <a href="home.html" class="nav-item">
        <span class="material-icons">home</span>
    </a>

    <a href="saved.html" class="nav-item">
        <span class="material-icons">book</span>
    </a>

    <a href="upload.html" class="nav-item add-btn">
        <span class="material-icons">add</span>
    </a>

    <a href="profile.html" class="nav-item">
        <span class="material-icons">person</span>
    </a>

</div>


<!-- Custom Restriction Modal Wrapper -->
<div id="restrictionModalWrapper" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 99999; justify-content: center; align-items: center; backdrop-filter: blur(2px);">
    <div style="background: white; padding: 24px; border-radius: 16px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2);">
        
        <!-- Icon -->
        <div style="background: #FEE2E2; color: #DC2626; width: 56px; height: 56px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto;">
            <span class="material-icons" style="font-size: 28px;">block</span>
        </div>
        
        <h3 style="margin-top: 16px; font-weight: 800; color: #111827; font-size: 20px;">Action Restricted</h3>
        <p id="restrictionMessage" style="color: #4B5563; font-size: 14px; margin: 12px 0 24px 0; line-height: 1.5;"></p>
        
        <button onclick="document.getElementById('restrictionModalWrapper').style.display='none';" style="background: #111827; color: white; border: none; padding: 14px 24px; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; width: 100%; transition: background 0.2s;">
            Understood
        </button>

    </div>
</div>


<script type="module" src="/js/upload.js"></script>
<script src="/js/nav.js"></script>
<script type="module" src="/js/auth-state.js"></script>
</body>
</html>
