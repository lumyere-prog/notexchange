<!DOCTYPE html>
<html>

<head>

<title>Notifications</title>
<link rel="stylesheet" href="/css/notifications.css">
<link rel="stylesheet" href="/css/global.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background-image: url('/photos/background.png'); background-size: cover; background-position: center; height: 100vh; margin: 0;">

<!-- APP HEADER -->

<div class="app-header">

<div class="app-title">Note Exchange</div>

<div class="bell-container">

<div class="bell">🔔</div>

<div class="badge" id="badgeCount"></div>

</div>

</div>


<!-- PAGE HEADER -->

<div class="page-header">

<span class="back" onclick="goBack()">←</span>
<h2>Notifications</h2>

</div>


<!-- SCROLLABLE CONTAINER -->

<div class="notifications-container" id="notificationsContainer"></div>



<!-- POST MODAL -->

<div class="modal" id="postModal">

<div class="modal-content">

<span class="close">&times;</span>

<h3 id="modalTitle"></h3>

<p id="modalContent"></p>

</div>

</div>


<script src="/js/notifications.js"></script>
<script src="/js/nav.js"></script>

</html>
