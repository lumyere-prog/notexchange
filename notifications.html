<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Notifications</title>
    <link rel="stylesheet" href="/css/notifications.css">
    <link rel="stylesheet" href="/css/global.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <div class="app-header">
        <div class="app-title">Note Exchange</div>
        <div class="bell-container">
            <span class="material-icons bell">notifications</span>
            <div class="badge" id="badgeCount"></div>
        </div>
    </div>

    <div class="page-header">
<span class="material-icons back" onclick="goBack()">arrow_back</span> <h2>Notifications</h2> </div>
      

    <div class="notifications-container" id="notificationsContainer"></div>
    <div class="notifications-container" id="notificationsContainer">
    <p id="emptyState" style="display:none; text-align:center; opacity:0.6; margin-top:20px;">
        No notifications yet
    </p>
</div>
    <div class="modal" id="postModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modalTitle"></h3>
            <p id="modalContent"></p>
        </div>
    </div>

    <script type="module" src="/js/auth-state.js"></script>
<script type="module" src="/js/notifications.js"></script>
<script src="/js/nav.js"></script>
</body>
</html>
