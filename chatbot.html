<!DOCTYPE html>
<html lang="en">
<head>
  <title>NoteXchange Chatbot Test</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');

    body {
      font-family: 'Roboto', sans-serif;
      padding: 20px;
    }

    #chatBox {
      border: 1px solid #ccc;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
    }

    .user {
      text-align: right;
      margin: 5px;
      color: blue;
    }

    .bot {
      text-align: left;
      margin: 5px;
      color: green;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }
  </style>
</head>
<body>

<h1>🤖 NoteXchange AI Chatbot</h1>

<div id="chatBox"></div>

<input id="prompt" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>

<br><br>

<input id="userID" placeholder="Paste your userID here">

<script>
const API = 'http://localhost:3000';

function addMessage(text, sender) {
  const div = document.createElement('div');
  div.className = sender;
  div.textContent = text;
  document.getElementById('chatBox').appendChild(div);
}

async function sendMessage() {
  const prompt = document.getElementById('prompt').value;
  const userID = document.getElementById('userID').value;

  if (!prompt || !userID) {
    alert("Enter prompt and userID");
    return;
  }

  addMessage("You: " + prompt, "user");

  const res = await fetch(`${API}/chatbot`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt, userID })
  });

  const data = await res.json();

  if (data.reply) {
    addMessage("AI: " + data.reply, "bot");
  } else {
    addMessage("Error: " + data.error, "bot");
  }

  document.getElementById('prompt').value = '';
}
</script>

</body>
</html>
