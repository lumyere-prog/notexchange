<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteXchange - Home</title>

    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/global.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
</head>

<body>

    <div class="top-area" id="topArea">
        <div id="topbar">
            <div class="header-row">
                <div class="brand-container">
                <img src="/photos/logofinal.jpg" alt="NoteXchange Logo" class="app-logo">
                    <span class="brand-text">NOTEXCHANGE</span>
                </div>
                <div class="bell-container" onclick="window.location.href='notifications.html'">
                <span class="material-icons bell">notifications</span>
                <span id="notificationCount" class="notification-badge" style="display: none;"></span>
                </div>
            </div>

        <div class="search-container">
    <input 
        type="text" 
        id="searchInputTrigger"
        placeholder="Search for notes..." 
        class="search-input"
        readonly
    >
        </div>
        <div class="categories-section">
            <h3 class="category-title">Categories</h3>
            <div class="categories-scroll" id="categoriesContainer">
                </div>
        </div>
    </div>

    </div>
    <div class="notes-feed" id="notesFeed">
        </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item">
            <span class="material-icons">home</span>
        </a>
        <a href="saved.html" class="nav-item">
            <span class="material-icons">book</span>
        </a>
        <a href="upload.html" class="nav-item add-btn">
            <span class="material-icons">add</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="material-icons">person</span>
        </a>
    </div>

    
<div id="searchPage" class="search-page">

  <div class="search-header">
    <span class="back-btn" onclick="closeSearch()">←</span>

    <input 
      type="text" 
      id="searchInput"
      placeholder="Search for notes, users..." 
      class="search-full"
      autocomplete="off"
    >
  </div>

  <div class="search-body">

    <h3 class="recent-title">Recent</h3>
    <div class="recent-list" id="recentList"></div>

    <h3 class="recent-title">Results</h3>
    <div id="searchResults"></div>

  </div>

</div>

    <div id="postModal" class="post-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">✕</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="checkInModal" class="reward-modal">
    <div class="reward-content">
        
        <!-- Asset Spot -->
        <img src="/photos/earned.png" alt="Reward Earned" class="reward-image">

        <!-- Transcribed Text -->
        <h3>Nice! You earned points!</h3>
        <p>You received 50 points just for checking in today. Keep it up!</p>

        <!-- Button with theme color -->
        <button type="button" class="claim-btn" onclick="claimReward()">Claim Reward</button>
    </div>
</div>
 
    <div id="globalTooltip" class="global-tooltip"></div>
    <div id="chatbot-btn">
        <span class="material-icons">chat</span>
    </div>
    

    <div id="chatbot-modal" style="display:none;">
        <div class="chat-header">
            <div style="display: flex; flex-direction: column;">
            <span>Lumiere - Study Companion</span>
            <!-- This span will hold the live points -->
            <span id="chatPointsDisplay" style="font-size: 12px; font-weight: 500; color: #FBBF24; margin-top: 2px;">
            Loading points...
            </span>
            </div>
            <button id="close-chat" type="button">✖</button>
        </div>

        <div class="chat-body" id="chat-body"></div>
        
        <div class="chat-footer">
            <input type="text" id="chat-input" placeholder="Write your message..." autocomplete="off">
            <button id="send-btn" type="button">➤</button>
        </div>
    </div>

    
    <script type="module" src="/js/chatbotscript.js"></script>
    <script type="module" src="/js/auth-state.js?v=2"></script>
    <script type="module" src="/js/home.js"></script>
    <script src="/js/nav.js"></script>

</body>
</html>
