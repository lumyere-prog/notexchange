<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteXchange</title>
    <link rel="stylesheet" href="css/style.css">

<body style="background-image: url('/photos/background.png'); background-size: cover; background-position: center; height: 100vh; margin: 0;">

    <!-- LOGO -->

    <!-- LOGIN CONTAINER -->
    <div class="login">

        <h1 class="sign">Sign in</h1>
        <p id="sign-p">Smarter way to study, share, and ask questions.</p>

<script>
document.getElementById("go-login-btn").addEventListener("click", function () {

});
</script>

        <p class="note">

        </p>

    </div>
<footer class="footer-terms">

    By using this app, you agree to the
    <a href="assets/terms.pdf" id="terms-link">Terms & Conditions</a>.
  </p>
</footer>
    
    <script src="js/script.js"></script>
    <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}
